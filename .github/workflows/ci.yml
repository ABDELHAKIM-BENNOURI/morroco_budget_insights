name: CI — Morocco Budget Insight 2026

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Lint Python ────────────────────────────────────────────────────
  lint-python:
    name: Lint Python scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Syntax check — compile tous les scripts .py (même vides)
        run: |
          shopt -s nullglob
          files=(scripts/*.py)
          if [ ${#files[@]} -eq 0 ]; then
            echo "  ⚠️  Aucun script .py trouvé dans scripts/ — étape ignorée"
            exit 0
          fi
          for f in "${files[@]}"; do
            if python -m py_compile "$f"; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f — erreur de syntaxe"
              exit 1
            fi
          done

      - name: Run flake8
        run: |
          flake8 scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503,E241,E221,E302 \
            --exclude=__pycache__

  # ── Job 2 : Build image Python ────────────────────────────────────────────
  build-python:
    name: Build Docker image Python
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image python
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/python/Dockerfile
          push: false
          tags: budget_python:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3 : Build image React (si dashboard/ existe) ──────────────────────
  build-react:
    name: Build Docker image React
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier si dashboard/ existe
        id: check-dashboard
        run: |
          if [ -d "dashboard" ] && [ -f "dashboard/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  dashboard/ absent — build React ignoré"
          fi

      - name: Set up Docker Buildx
        if: steps.check-dashboard.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image react
        if: steps.check-dashboard.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/react/Dockerfile
          push: false
          tags: budget_react:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4 : Vérification structure du projet ──────────────────────────────
  check-structure:
    name: Vérifier structure du projet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer dossiers data/ (mkdir -p)
        run: |
          for d in data/raw data/clean data/models; do
            mkdir -p "$d"
            echo "  ✅  $d (créé ou déjà présent)"
          done

      - name: Vérifier dossiers code obligatoires
        run: |
          dirs=("scripts" "docker/python" "docker/react")
          for d in "${dirs[@]}"; do
            if [ -d "$d" ]; then
              echo "  ✅  $d"
            else
              echo "  ❌  $d manquant"
              exit 1
            fi
          done

      - name: Vérifier fichiers obligatoires
        run: |
          files=( \
            "requirements.txt" \
            "docker-compose.yml" \
            "docker/python/Dockerfile" \
            "docker/react/Dockerfile" \
            "scripts/01_extract.py" \
            ".gitignore" \
          )
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f manquant"
              exit 1
            fi
          done

      - name: Vérifier que le contenu de data/raw/ est ignoré par git
        run: |
          tmpfile="data/raw/__ci_test_ignore.pdf"
          touch "$tmpfile"
          if git check-ignore -q "$tmpfile"; then
            echo "  ✅  data/raw/* correctement ignoré (.gitignore)"
            rm -f "$tmpfile"
          else
            rm -f "$tmpfile"
            echo "  ❌  data/raw/* n'est PAS dans .gitignore — PDFs sensibles exposés !"
            exit 1
          fi

      - name: Vérifier que les .gitkeep sont bien re-inclus
        run: |
          for f in data/raw/.gitkeep data/clean/.gitkeep data/models/.gitkeep; do
            if git check-ignore -q "$f"; then
              echo "  ❌  $f est ignoré (exception !data/*/.gitkeep cassée)"
              exit 1
            else
              echo "  ✅  $f tracké (exception OK)"
            fi
          done

  # ── Job 5 : Déploiement GitHub Pages ──────────────────────────────────────
  # Publie dashboard/dist/ sur GitHub Pages (sur push vers main uniquement).
  # Pré-requis pour des figures fonctionnelles : data/clean/*.csv doit être
  # disponible sur le runner (committé OU récupéré dans une étape custom).
  # Sans CSV, le pipeline est sauté et le dashboard est déployé sans figures
  # (les fetch /data/*.json renverront 404 côté navigateur).
  deploy-pages:
    name: Déployer dashboard (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [lint-python, build-python, build-react, check-structure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bloquer si dashboard/ absent
        run: |
          if [ ! -f "dashboard/package.json" ]; then
            echo "❌ dashboard/package.json introuvable — rien à déployer."
            exit 1
          fi

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install --no-cache-dir -r requirements.txt

      - name: Pipeline data 02 → 05 (best effort)
        id: pipeline
        run: |
          set -e
          if ! ls data/clean/*.csv >/dev/null 2>&1; then
            echo "::warning::data/clean/*.csv absent — pipeline sauté."
            echo "             Le dashboard sera déployé sans figures (404 en runtime)."
            echo "             → committez data/clean/ ou adaptez le workflow pour les fetcher."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/02_clean.py
          python scripts/03_model.py
          python scripts/04_sankey.py
          python scripts/05_treemap.py
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dépendances npm
        working-directory: dashboard
        run: npm install --no-audit --no-fund

      - name: Build dashboard (Vite)
        working-directory: dashboard
        env:
          # GH Pages projet : `/<repo>/` ; user/org pages : `/`.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build -- --base="$BASE_PATH"

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
