name: CI — Morocco Budget Insight 2026

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Lint Python ────────────────────────────────────────────────────
  lint-python:
    name: Lint Python scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__

  # ── Job 2 : Build image Python ────────────────────────────────────────────
  build-python:
    name: Build Docker image Python
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image python
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/python/Dockerfile
          push: false
          tags: budget_python:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3 : Build image React (si dashboard/ existe) ──────────────────────
  build-react:
    name: Build Docker image React
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier si dashboard/ existe
        id: check-dashboard
        run: |
          if [ -d "dashboard" ] && [ -f "dashboard/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  dashboard/ absent — build React ignoré"
          fi

      - name: Set up Docker Buildx
        if: steps.check-dashboard.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image react
        if: steps.check-dashboard.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/react/Dockerfile
          push: false
          tags: budget_react:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4 : Vérification structure data/clean ─────────────────────────────
  check-structure:
    name: Vérifier structure du projet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier dossiers obligatoires
        run: |
          echo "Vérification de la structure..."
          dirs=("data/raw" "data/clean" "data/models" "scripts" "docker/python" "docker/react")
          for d in "${dirs[@]}"; do
            if [ -d "$d" ]; then
              echo "  ✅  $d"
            else
              echo "  ❌  $d manquant"
              exit 1
            fi
          done

      - name: Vérifier fichiers obligatoires
        run: |
          files=("requirements.txt" "docker-compose.yml" "docker/python/Dockerfile" "docker/react/Dockerfile" "scripts/01_extract.py")
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f manquant"
              exit 1
            fi
          done

      - name: Vérifier que data/raw/ est ignoré par git
        run: |
          if git check-ignore -q data/raw; then
            echo "  ✅  data/raw/ correctement ignoré (.gitignore)"
          else
            echo "  ❌  data/raw/ n'est PAS dans .gitignore — PDFs sensibles exposés !"
            exit 1
          fi
