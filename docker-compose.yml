version: "3.9"

services:

  python:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: budget_python
    volumes:
      - ./scripts:/app/scripts
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - budget_net

  react:
    build:
      context: .
      dockerfile: docker/react/Dockerfile
    container_name: budget_react
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    env_file:
      - .env
    networks:
      - budget_net

networks:
  budget_net:
    driver: bridge